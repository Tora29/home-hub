openapi: 3.0.3
info:
  title: Home Hub API
  version: 1.0.0
  description: Home Hub 全機能の API 定義。
tags:
  - name: dashboard
    description: ダッシュボード集計
  - name: expense
    description: 支出管理
  - name: expense-categories
    description: 支出カテゴリ管理
  - name: recipes
    description: レシピ管理
  - name: recipes-ai
    description: AI 献立サポート
paths:
  /dashboard/summary:
    get:
      tags:
        - dashboard
      summary: 集計サマリー取得
      description: |
        支出の集計サマリーを取得する。
        - `period=month`（デフォルト）: 指定月の集計。`month` 省略時は当月
        - `period=all`: 全期間の集計
        集計対象は未承認・確認済み・確定済みの全ステータスを含む。
      parameters:
        - name: period
          in: query
          required: false
          schema:
            type: string
            enum:
              - month
              - all
            default: month
          description: 集計期間。`month`（月別）または `all`（全期間）
        - name: month
          in: query
          required: false
          schema:
            type: string
            pattern: ^\d{4}-\d{2}$
            example: 2026-04
          description: 対象月（YYYY-MM 形式）。`period=month` の場合のみ有効。省略時は当月
      responses:
        '200':
          description: 集計サマリー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardSummary'
  /expenses:
    get:
      tags:
        - expense
      summary: 支出一覧取得
      description: 指定した月の全ユーザーの支出一覧と世帯合計金額を返す。month を省略した場合は当月。
      parameters:
        - name: month
          in: query
          required: false
          schema:
            type: string
            pattern: ^\d{4}-\d{2}$
            example: 2026-03
          description: 対象月（YYYY-MM 形式）。省略時は当月
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: 支出一覧
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                  - total
                  - page
                  - limit
                  - monthTotal
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ExpenseWithRelations'
                  total:
                    type: integer
                    description: 当月の合計件数
                  page:
                    type: integer
                  limit:
                    type: integer
                  monthTotal:
                    type: integer
                    description: 当月の世帯合計金額（円・全ユーザー・全ステータス）
    post:
      tags:
        - expense
      summary: 支出登録
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExpenseCreate'
      responses:
        '201':
          description: 登録成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseWithRelations'
        '400':
          $ref: '#/components/responses/ValidationError'
  /expenses/request:
    post:
      tags:
        - expense
      summary: 一括承認依頼
      description: |
        自分が登録した `checked` ステータスの全支出を `pending` に変更し、相手へ LINE 通知を送信する。
        - `checked` 支出が 0 件の場合は 409 を返す
        - `user.role` が未設定の場合は 409 を返す
        - LINE API 失敗時は 502 を返す（DB 更新は成功していても 502 で返却）
      responses:
        '200':
          description: 承認依頼成功（更新件数を返す）
          content:
            application/json:
              schema:
                type: object
                required:
                  - count
                properties:
                  count:
                    type: integer
                    description: 承認依頼した件数
        '409':
          $ref: '#/components/responses/Conflict'
        '502':
          $ref: '#/components/responses/BadGateway'
  /expenses/cancel:
    post:
      tags:
        - expense
      summary: 一括申請取り消し
      description: |
        自分が登録した `pending` ステータスの全支出を `checked` に戻す。
        - `pending` 支出が 0 件の場合は 409 を返す
      responses:
        '200':
          description: 申請取り消し成功（更新件数を返す）
          content:
            application/json:
              schema:
                type: object
                required:
                  - count
                properties:
                  count:
                    type: integer
                    description: 取り消した件数
        '409':
          $ref: '#/components/responses/Conflict'
  /expenses/approve:
    post:
      tags:
        - expense
      summary: 一括承認
      description: |
        他ユーザーが登録した `pending` ステータスの全支出を `approved` に変更し、申請者へ LINE 通知を送信する。
        - 自己承認（自分の pending を承認しようとした場合）は 403 を返す
        - 相手の `pending` 支出が 0 件の場合は 409 を返す
        - `user.role` が未設定の場合は 409 を返す
        - LINE API 失敗時は 502 を返す
      responses:
        '200':
          description: 承認成功（更新件数を返す）
          content:
            application/json:
              schema:
                type: object
                required:
                  - count
                properties:
                  count:
                    type: integer
                    description: 承認した件数
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '502':
          $ref: '#/components/responses/BadGateway'
  /expenses/{id}:
    put:
      tags:
        - expense
      summary: 支出更新
      description: |
        支出のデータ（金額・カテゴリ・支払者）を更新する。
        - 登録者（userId）以外が実行した場合は 403 を返す
        - `pending` / `approved` の支出は更新不可（409）
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExpenseUpdate'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseWithRelations'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags:
        - expense
      summary: 支出削除
      description: |
        - 登録者（userId）以外が実行した場合は 403 を返す
        - `pending` / `approved` の支出は削除不可（409）
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: 削除成功
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /expenses/{id}/check:
    post:
      tags:
        - expense
      summary: 支出確認（unapproved → checked）
      description: |
        自分が登録した `unapproved` の支出を `checked` に更新する。
        - 登録者（userId）以外が実行した場合は 403 を返す
        - `checked` / `pending` / `approved` の支出には操作不可（409）
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: 確認成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseWithRelations'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /expenses/{id}/uncheck:
    post:
      tags:
        - expense
      summary: 支出確認取消（checked → unapproved）
      description: |
        自分が登録した `checked` の支出を `unapproved` に戻す。
        - 登録者（userId）以外が実行した場合は 403 を返す
        - `unapproved` / `pending` / `approved` の支出には操作不可（409）
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: 確認取消成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseWithRelations'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /expenses/categories:
    get:
      tags:
        - expense-categories
      summary: カテゴリ一覧取得
      responses:
        '200':
          description: カテゴリ一覧
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                  - total
                  - page
                  - limit
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Category'
                  total:
                    type: integer
                  page:
                    type: integer
                  limit:
                    type: integer
    post:
      tags:
        - expense-categories
      summary: カテゴリ登録
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryCreate'
      responses:
        '201':
          description: 登録成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '400':
          $ref: '#/components/responses/ValidationError'
  /expenses/categories/{id}:
    put:
      tags:
        - expense-categories
      summary: カテゴリ更新
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryUpdate'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - expense-categories
      summary: カテゴリ削除
      description: カテゴリに紐付く支出が 1 件以上ある場合は 409 を返す。
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: 削除成功
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /recipes:
    get:
      tags:
        - recipes
      summary: レシピ一覧取得
      operationId: listRecipes
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort
          in: query
          schema:
            type: string
            enum:
              - createdAt_desc
              - lastCookedAt_asc
              - cookedCount_desc
              - rating_desc
            default: createdAt_desc
          description: |
            ソート順:
            - createdAt_desc: 登録順（新しい順・デフォルト）
            - lastCookedAt_asc: しばらく作ってない順（NULL 先頭）
            - cookedCount_desc: よく作る順
            - rating_desc: 評価が高い順（excellent→good→average→poor→未設定）
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DishList'
    post:
      tags:
        - recipes
      summary: レシピ登録
      operationId: createRecipe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DishCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dish'
        '400':
          $ref: '#/components/responses/ValidationError'
  /recipes/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    put:
      tags:
        - recipes
      summary: レシピ更新
      operationId: updateRecipe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DishUpdate'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dish'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - recipes
      summary: レシピ削除
      operationId: deleteRecipe
      responses:
        '204':
          description: No Content
        '404':
          $ref: '#/components/responses/NotFound'
  /recipes/extract:
    post:
      tags:
        - recipes-ai
      summary: AI レシピ抽出
      operationId: extractRecipe
      description: |
        レシピサイトからコピーした生テキスト（広告・ナビゲーション等のノイズを含んでよい）を
        Workers AI（llama-3.1）に渡し、構造化されたレシピデータを抽出して返す。
        抽出できなかったフィールドは null。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExtractRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtractResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
  /recipes/ask:
    post:
      tags:
        - recipes-ai
      summary: AI 献立相談
      operationId: askRecipes
      description: |
        ユーザーの全レシピ（name・ingredients・lastCookedAt・rating・difficulty・cookedCount）を
        コンテキストとして Workers AI（llama-3.1）に渡し、自然言語の質問に回答する。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AskRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AskResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
components:
  schemas:
    DashboardSummary:
      type: object
      required:
        - overall
        - byPayer
        - byCategory
      properties:
        overall:
          type: integer
          description: 対象期間の支出合計金額（円・世帯全体）
          example: 150000
        byPayer:
          type: array
          description: 支払者別合計（合計金額の多い順）。支払者は user テーブルから取得
          items:
            $ref: '#/components/schemas/PayerSummary'
        byCategory:
          type: array
          description: カテゴリ別合計（合計金額の多い順）
          items:
            $ref: '#/components/schemas/CategorySummary'
    PayerSummary:
      type: object
      required:
        - payerId
        - payerName
        - total
      properties:
        payerId:
          type: string
          description: 支払者ユーザー ID（users テーブルの id）
        payerName:
          type: string
          description: 支払者名（users テーブルの name）
        total:
          type: integer
          description: 合計金額（円）
          example: 80000
    CategorySummary:
      type: object
      required:
        - categoryId
        - categoryName
        - total
      properties:
        categoryId:
          type: string
          description: カテゴリ ID
        categoryName:
          type: string
          description: カテゴリ名
        total:
          type: integer
          description: 合計金額（円）
          example: 60000
    Expense:
      type: object
      required:
        - id
        - userId
        - amount
        - categoryId
        - payerUserId
        - status
        - createdAt
      properties:
        id:
          type: string
          description: 支出 ID
        userId:
          type: string
          description: 登録ユーザー ID
        amount:
          type: integer
          minimum: 1
          maximum: 9999999
          description: 支出金額（円）
        categoryId:
          type: string
          description: カテゴリ ID
        payerUserId:
          type: string
          description: 支払者ユーザー ID（users テーブルの id）
        status:
          type: string
          enum:
            - unapproved
            - checked
            - pending
            - approved
          description: |
            承認ステータス。
            - `unapproved`: 未承認（登録直後）
            - `checked`: 確認済み（チェックボックスで確認）
            - `pending`: 申請中（承認依頼送信後）
            - `approved`: 承認済み（相手が承認完了）
        createdAt:
          type: string
          format: date-time
          description: 登録日時（自動セット）
    ExpenseWithRelations:
      allOf:
        - $ref: '#/components/schemas/Expense'
        - type: object
          required:
            - category
            - payer
          properties:
            category:
              $ref: '#/components/schemas/Category'
            payer:
              $ref: '#/components/schemas/User'
    ExpenseCreate:
      type: object
      required:
        - amount
        - categoryId
        - payerUserId
      properties:
        amount:
          type: integer
          minimum: 1
          maximum: 9999999
          description: 支出金額（円）。1以上9,999,999以下の整数
        categoryId:
          type: string
          minLength: 1
          description: カテゴリ ID
        payerUserId:
          type: string
          minLength: 1
          description: 支払者ユーザー ID
    ExpenseUpdate:
      type: object
      required:
        - amount
        - categoryId
        - payerUserId
      properties:
        amount:
          type: integer
          minimum: 1
          maximum: 9999999
          description: 支出金額（円）
        categoryId:
          type: string
          minLength: 1
          description: カテゴリ ID
        payerUserId:
          type: string
          minLength: 1
          description: 支払者ユーザー ID
    Category:
      type: object
      required:
        - id
        - userId
        - name
        - createdAt
      properties:
        id:
          type: string
          description: カテゴリ ID
        userId:
          type: string
          description: 登録ユーザー ID
        name:
          type: string
          description: カテゴリ名
        createdAt:
          type: string
          format: date-time
          description: 登録日時
    CategoryCreate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
          description: カテゴリ名。1文字以上50文字以内
    CategoryUpdate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
          description: カテゴリ名。1文字以上50文字以内
    User:
      type: object
      required:
        - id
        - name
        - email
      properties:
        id:
          type: string
          description: ユーザー ID
        name:
          type: string
          description: 表示名
        email:
          type: string
          description: メールアドレス
    Ingredient:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: 材料名
          example: 鶏もも肉
        amount:
          type: string
          description: '量・単位（例: 300g、1個）'
          example: 300g
    Rating:
      type: string
      enum:
        - excellent
        - good
        - average
        - poor
      description: |
        評価:
        - excellent: 非常に美味しい
        - good: 美味しい
        - average: 普通
        - poor: 微妙
    Difficulty:
      type: string
      enum:
        - easy
        - medium
        - hard
      description: |
        難易度:
        - easy: 簡単
        - medium: 普通
        - hard: 難しい
    Dish:
      type: object
      required:
        - id
        - userId
        - name
        - cookedCount
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          description: UUID
        userId:
          type: string
          description: オーナーユーザー ID
        name:
          type: string
          maxLength: 100
          description: レシピ名
        description:
          type: string
          maxLength: 500
          nullable: true
          description: 概要
        imageUrl:
          type: string
          nullable: true
          description: 画像 URL（外部 URL）
        ingredients:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/Ingredient'
          description: 材料リスト
        steps:
          type: array
          nullable: true
          items:
            type: string
          description: 手順リスト
        sourceUrl:
          type: string
          nullable: true
          description: 参照元レシピ URL
        servings:
          type: integer
          minimum: 1
          nullable: true
          description: 何人前
        cookingTimeMinutes:
          type: integer
          minimum: 1
          nullable: true
          description: 調理時間（分）
        cookedCount:
          type: integer
          minimum: 0
          default: 0
          description: 作った回数
        lastCookedAt:
          type: string
          format: date-time
          nullable: true
          description: 最終調理日時
        rating:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/Rating'
          description: 評価
        difficulty:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/Difficulty'
          description: 難易度
        memo:
          type: string
          maxLength: 1000
          nullable: true
          description: 調理後の個人メモ
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    DishCreate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: レシピ名（必須）
        description:
          type: string
          maxLength: 500
        imageUrl:
          type: string
        ingredients:
          type: array
          items:
            $ref: '#/components/schemas/Ingredient'
        steps:
          type: array
          items:
            type: string
        sourceUrl:
          type: string
        servings:
          type: integer
          minimum: 1
        cookingTimeMinutes:
          type: integer
          minimum: 1
        rating:
          $ref: '#/components/schemas/Rating'
        difficulty:
          $ref: '#/components/schemas/Difficulty'
        memo:
          type: string
          maxLength: 1000
    DishUpdate:
      type: object
      required:
        - name
        - cookedCount
      description: 全フィールド送信（PUT）。省略可能フィールドは null で明示的にクリアできる。
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 500
          nullable: true
        imageUrl:
          type: string
          nullable: true
        ingredients:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/Ingredient'
        steps:
          type: array
          nullable: true
          items:
            type: string
        sourceUrl:
          type: string
          nullable: true
        servings:
          type: integer
          minimum: 1
          nullable: true
        cookingTimeMinutes:
          type: integer
          minimum: 1
          nullable: true
        cookedCount:
          type: integer
          minimum: 0
        lastCookedAt:
          type: string
          format: date-time
          nullable: true
        rating:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/Rating'
        difficulty:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/Difficulty'
        memo:
          type: string
          maxLength: 1000
          nullable: true
    DishList:
      type: object
      required:
        - items
        - total
        - page
        - limit
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Dish'
        total:
          type: integer
          description: 条件に合う全件数
        page:
          type: integer
          description: 現在のページ（1 始まり）
        limit:
          type: integer
          description: 1 ページあたりの件数
    ExtractRequest:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          minLength: 1
          description: レシピサイトからコピーした生テキスト（ノイズ込みで可）
    ExtractResponse:
      type: object
      description: AI が抽出したレシピデータ。抽出できなかったフィールドは null。
      properties:
        name:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        servings:
          type: integer
          nullable: true
        cookingTimeMinutes:
          type: integer
          nullable: true
        ingredients:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/Ingredient'
        steps:
          type: array
          nullable: true
          items:
            type: string
    AskRequest:
      type: object
      required:
        - question
      properties:
        question:
          type: string
          minLength: 1
          maxLength: 500
          description: 献立に関する自然言語の質問
          example: 最近作ってないもので肉系が食べたいんだけどいいのある？
    AskResponse:
      type: object
      required:
        - answer
      properties:
        answer:
          type: string
          description: Workers AI による回答
    AppError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - VALIDATION_ERROR
            - NOT_FOUND
            - INTERNAL_SERVER_ERROR
        message:
          type: string
        fields:
          type: array
          description: バリデーションエラー時のフィールドエラー一覧
          items:
            type: object
            required:
              - field
              - message
            properties:
              field:
                type: string
              message:
                type: string
  responses:
    ValidationError:
      description: バリデーションエラー
      content:
        application/json:
          schema:
            type: object
            required:
              - code
              - message
            properties:
              code:
                type: string
                example: VALIDATION_ERROR
              message:
                type: string
                example: 入力値が正しくありません
              fields:
                type: array
                items:
                  type: object
                  required:
                    - field
                    - message
                  properties:
                    field:
                      type: string
                      example: field_name
                    message:
                      type: string
                      example: フィールドは必須です
    NotFound:
      description: リソースが見つからない
      content:
        application/json:
          schema:
            type: object
            required:
              - code
              - message
            properties:
              code:
                type: string
                example: NOT_FOUND
              message:
                type: string
                example: 該当データが見つかりません
    Conflict:
      description: 競合エラー（使用中のリソースは削除不可）
      content:
        application/json:
          schema:
            type: object
            required:
              - code
              - message
            properties:
              code:
                type: string
                example: CONFLICT
              message:
                type: string
                example: このリソースは使用中のため削除できません
    Forbidden:
      description: 権限エラー（他ユーザーのリソース操作・自己承認等）
      content:
        application/json:
          schema:
            type: object
            required:
              - code
              - message
            properties:
              code:
                type: string
                example: FORBIDDEN
              message:
                type: string
                example: 他のユーザーの支出は操作できません
    BadGateway:
      description: 外部 API エラー（LINE 通知失敗）
      content:
        application/json:
          schema:
            type: object
            required:
              - code
              - message
            properties:
              code:
                type: string
                example: BAD_GATEWAY
              message:
                type: string
                example: LINE 通知の送信に失敗したため承認フローを完了できませんでした
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: リソース ID
